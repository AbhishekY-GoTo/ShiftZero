version: '3.8'

services:
  # PostgreSQL database for incident history
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: shiftzero
      POSTGRES_USER: shiftzero
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftzero"]
      interval: 10s
      timeout: 5s
      retries: 5

